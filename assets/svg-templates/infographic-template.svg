<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <style>
      .title { font-size: 32px; font-weight: bold; fill: #0066CC; font-family: Arial, sans-serif; text-anchor: middle; }
      .section-title { font-size: 18px; font-weight: bold; fill: #ffffff; font-family: Arial, sans-serif; text-anchor: middle; }
      .content-text { font-size: 13px; fill: #333333; font-family: Arial, sans-serif; text-anchor: middle; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#ffffff" stroke="#CCCCCC" stroke-width="1"/>

  <!-- Header section -->
  <rect x="0" y="0" width="600" height="80" fill="#f5f5f5" stroke="#CCCCCC" stroke-width="1"/>
  <text x="300" y="50" class="title">Your Infographic Title</text>

  <!-- Main content area with 3 sections -->
  <g id="section-1">
    <rect x="20" y="110" width="170" height="220" rx="8" fill="#0066CC" stroke="#003D99" stroke-width="2"/>
    <text x="105" y="145" class="section-title">Section 1</text>
    <text x="105" y="170" class="content-text" fill="#ffffff">Add your content</text>
    <text x="105" y="190" class="content-text" fill="#ffffff">here</text>
  </g>

  <g id="section-2">
    <rect x="215" y="110" width="170" height="220" rx="8" fill="#00AA00" stroke="#006600" stroke-width="2"/>
    <text x="300" y="145" class="section-title">Section 2</text>
    <text x="300" y="170" class="content-text" fill="#ffffff">Add your content</text>
    <text x="300" y="190" class="content-text" fill="#ffffff">here</text>
  </g>

  <g id="section-3">
    <rect x="410" y="110" width="170" height="220" rx="8" fill="#FF6600" stroke="#CC4400" stroke-width="2"/>
    <text x="495" y="145" class="section-title">Section 3</text>
    <text x="495" y="170" class="content-text" fill="#ffffff">Add your content</text>
    <text x="495" y="190" class="content-text" fill="#ffffff">here</text>
  </g>

  <!-- Footer section -->
  <rect x="0" y="350" width="600" height="50" fill="#f5f5f5" stroke="#CCCCCC" stroke-width="1"/>
  <text x="300" y="380" style="font-size: 12px; fill: #666666; font-family: Arial, sans-serif; text-anchor: center;">
    Edit this template - update colors, text, and layout as needed
  </text>
</svg>