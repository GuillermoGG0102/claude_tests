<svg xmlns="http://www.w3.org/2000/svg" width="700" height="600" viewBox="0 0 700 600">
  <defs>
    <style>
      .title { font-size: 28px; font-weight: bold; fill: #0066CC; font-family: Arial, sans-serif; }
      .folder-label { font-size: 14px; font-weight: bold; fill: white; font-family: Arial, sans-serif; text-anchor: middle; }
      .description { font-size: 12px; fill: #333333; font-family: Arial, sans-serif; text-anchor: middle; }
      .connection-line { stroke: #CCCCCC; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text x="350" y="40" class="title">Project Structure</text>
  <line x1="100" y1="55" x2="600" y2="55" stroke="#0066CC" stroke-width="2"/>

  <!-- Central node: Claude Tests -->
  <rect x="275" y="100" width="150" height="50" rx="5" fill="#0066CC" stroke="#003D99" stroke-width="2"/>
  <text x="350" y="132" class="folder-label">claude_tests</text>

  <!-- Row 1: Left side -->
  <line x1="350" y1="150" x2="150" y2="220" class="connection-line"/>
  <rect x="50" y="220" width="200" height="60" rx="5" fill="#00AA00" stroke="#006600" stroke-width="2"/>
  <text x="150" y="245" class="folder-label">scripts/</text>
  <text x="150" y="265" class="description">Executable code</text>
  <text x="150" y="278" class="description">and utilities</text>

  <!-- Row 1: Center -->
  <line x1="350" y1="150" x2="350" y2="220" class="connection-line"/>
  <rect x="250" y="220" width="200" height="60" rx="5" fill="#FF6600" stroke="#CC4400" stroke-width="2"/>
  <text x="350" y="245" class="folder-label">references/</text>
  <text x="350" y="265" class="description">Documentation</text>
  <text x="350" y="278" class="description">and guides</text>

  <!-- Row 1: Right side -->
  <line x1="350" y1="150" x2="550" y2="220" class="connection-line"/>
  <rect x="450" y="220" width="200" height="60" rx="5" fill="#9933FF" stroke="#6600CC" stroke-width="2"/>
  <text x="550" y="245" class="folder-label">examples/</text>
  <text x="550" y="265" class="description">Working samples</text>
  <text x="550" y="278" class="description">and demos</text>

  <!-- Row 2: Left -->
  <line x1="350" y1="150" x2="100" y2="370" class="connection-line"/>
  <rect x="0" y="370" width="200" height="60" rx="5" fill="#3399FF" stroke="#0066CC" stroke-width="2"/>
  <text x="100" y="395" class="folder-label">tests/</text>
  <text x="100" y="415" class="description">Test files and</text>
  <text x="100" y="428" class="description">validation</text>

  <!-- Row 2: Center-Left -->
  <line x1="350" y1="150" x2="250" y2="370" class="connection-line"/>
  <rect x="150" y="370" width="200" height="60" rx="5" fill="#FF3366" stroke="#CC0033" stroke-width="2"/>
  <text x="250" y="395" class="folder-label">assets/</text>
  <text x="250" y="415" class="description">Images, templates,</text>
  <text x="250" y="428" class="description">and data files</text>

  <!-- Row 2: Center-Right -->
  <line x1="350" y1="150" x2="450" y2="370" class="connection-line"/>
  <rect x="350" y="370" width="200" height="60" rx="5" fill="#00CCCC" stroke="#0099CC" stroke-width="2"/>
  <text x="450" y="395" class="folder-label">docs/</text>
  <text x="450" y="415" class="description">Additional</text>
  <text x="450" y="428" class="description">documentation</text>

  <!-- Row 2: Right -->
  <line x1="350" y1="150" x2="600" y2="370" class="connection-line"/>
  <rect x="500" y="370" width="200" height="60" rx="5" fill="#FFAA00" stroke="#CC8800" stroke-width="2"/>
  <text x="600" y="395" class="folder-label">.claude/</text>
  <text x="600" y="415" class="description">Configuration</text>
  <text x="600" y="428" class="description">and settings</text>

  <!-- Footer info -->
  <line x1="50" y1="520" x2="650" y2="520" stroke="#DDDDDD" stroke-width="1"/>
  <text x="50" y="545" style="font-size: 11px; fill: #666666; font-family: Arial, sans-serif;">
    Each folder follows Claude's recommended structure for scalable, professional projects
  </text>
  <text x="50" y="565" style="font-size: 11px; fill: #666666; font-family: Arial, sans-serif;">
    See references/PROJECT_STRUCTURE.md for detailed documentation
  </text>
</svg>