<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400">
  <defs>
    <style>
      .title { font-size: 26px; font-weight: bold; fill: #0066CC; font-family: Arial, sans-serif; text-anchor: middle; }
      .milestone-year { font-size: 18px; font-weight: bold; fill: #0066CC; font-family: Arial, sans-serif; text-anchor: middle; }
      .milestone-label { font-size: 13px; fill: #333333; font-family: Arial, sans-serif; text-anchor: middle; }
      .milestone-desc { font-size: 11px; fill: #666666; font-family: Arial, sans-serif; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- Title -->
  <text x="350" y="40" class="title">Claude Skills Development Timeline</text>
  <line x1="80" y1="55" x2="620" y2="55" stroke="#0066CC" stroke-width="2"/>

  <!-- Main timeline line -->
  <line x1="50" y1="150" x2="650" y2="150" stroke="#0066CC" stroke-width="3"/>

  <!-- Timeline Point 1 -->
  <circle cx="100" cy="150" r="12" fill="#0066CC" stroke="#003D99" stroke-width="2"/>
  <circle cx="100" cy="150" r="6" fill="white"/>
  <text x="100" y="200" class="milestone-year">2024</text>
  <text x="100" y="220" class="milestone-label">Foundation</text>
  <text x="100" y="235" class="milestone-desc">Project structure</text>
  <text x="100" y="248" class="milestone-desc">setup</text>

  <!-- Timeline Point 2 -->
  <circle cx="250" cy="150" r="12" fill="#00AA00" stroke="#006600" stroke-width="2"/>
  <circle cx="250" cy="150" r="6" fill="white"/>
  <text x="250" y="200" class="milestone-year">2024-Q2</text>
  <text x="250" y="220" class="milestone-label">Basic Skills</text>
  <text x="250" y="235" class="milestone-desc">First example</text>
  <text x="250" y="248" class="milestone-desc">skills created</text>

  <!-- Timeline Point 3 -->
  <circle cx="400" cy="150" r="12" fill="#FF6600" stroke="#CC4400" stroke-width="2"/>
  <circle cx="400" cy="150" r="6" fill="white"/>
  <text x="400" y="200" class="milestone-year">2024-Q3</text>
  <text x="400" y="220" class="milestone-label">Framework</text>
  <text x="400" y="235" class="milestone-desc">Skill development</text>
  <text x="400" y="248" class="milestone-desc">framework</text>

  <!-- Timeline Point 4 -->
  <circle cx="550" cy="150" r="12" fill="#9933FF" stroke="#6600CC" stroke-width="2"/>
  <circle cx="550" cy="150" r="6" fill="white"/>
  <text x="550" y="200" class="milestone-year">2024-Q4</text>
  <text x="550" y="220" class="milestone-label">Advanced</text>
  <text x="550" y="235" class="milestone-desc">Complex skill</text>
  <text x="550" y="248" class="milestone-desc">implementations</text>

  <!-- Timeline Point 5 (future) -->
  <circle cx="650" cy="150" r="12" fill="#CCCCCC" stroke="#999999" stroke-width="2"/>
  <circle cx="650" cy="150" r="6" fill="white"/>
  <text x="650" y="200" class="milestone-year">2025</text>
  <text x="650" y="220" class="milestone-label">Ecosystem</text>
  <text x="650" y="235" class="milestone-desc">Shared library</text>
  <text x="650" y="248" class="milestone-desc">of skills</text>

  <!-- Decorative elements -->
  <line x1="50" y1="280" x2="650" y2="280" stroke="#EEEEEE" stroke-width="1"/>

  <!-- Key milestones section -->
  <text x="50" y="310" style="font-size: 14px; font-weight: bold; fill: #0066CC; font-family: Arial, sans-serif;">
    Key Milestones:
  </text>
  <text x="50" y="330" style="font-size: 12px; fill: #333333; font-family: Arial, sans-serif;">
    ✓ Project structure established with recommended Claude patterns
  </text>
  <text x="50" y="348" style="font-size: 12px; fill: #333333; font-family: Arial, sans-serif;">
    ✓ SVG infographic system for creating professional vector graphics
  </text>
  <text x="50" y="366" style="font-size: 12px; fill: #333333; font-family: Arial, sans-serif;">
    ✓ Comprehensive documentation and examples for skill development
  </text>
</svg>