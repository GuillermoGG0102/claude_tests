<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1400" viewBox="0 0 1000 1400">
  <defs>
    <style>
      .main-title { font-size: 42px; font-weight: bold; fill: #0066CC; font-family: Arial, sans-serif; text-anchor: middle; }
      .section-title { font-size: 24px; font-weight: bold; fill: white; font-family: Arial, sans-serif; }
      .field-name { font-size: 16px; font-weight: bold; fill: #0066CC; font-family: Arial, sans-serif; }
      .field-desc { font-size: 12px; fill: #333333; font-family: Arial, sans-serif; }
      .example-text { font-size: 11px; fill: #666666; font-family: 'Courier New', monospace; }
      .icon { font-size: 32px; text-anchor: middle; }
      .checkbox { font-size: 14px; fill: #00AA00; font-weight: bold; font-family: Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1400" fill="#ffffff"/>

  <!-- Top gradient bar -->
  <rect width="1000" height="80" fill="#0066CC"/>
  <text x="500" y="50" class="main-title" fill="white">How to Create Claude Skills</text>

  <!-- SIZE CONSTRAINT Section -->
  <rect x="30" y="110" width="940" height="120" rx="10" fill="#f0f0f0" stroke="#CCCCCC" stroke-width="2"/>
  <text x="50" y="135" class="field-name">📏 SIZE CONSTRAINT</text>
  <rect x="350" y="145" width="300" height="70" rx="8" fill="#FF6600" stroke="#CC4400" stroke-width="3"/>
  <text x="500" y="180" style="font-size: 32px; font-weight: bold; fill: white; font-family: Arial, sans-serif; text-anchor: middle;">&lt; 500 LINES</text>
  <text x="500" y="205" style="font-size: 12px; fill: #333333; font-family: Arial, sans-serif; text-anchor: center;">Keep code concise and focused</text>

  <!-- MANDATORY FIELDS Section -->
  <rect x="30" y="250" width="940" height="230" rx="10" fill="#f9f9f9" stroke="#0066CC" stroke-width="2"/>
  <rect x="30" y="250" width="940" height="35" rx="10 10 0 0" fill="#0066CC"/>
  <text x="50" y="272" class="section-title">⭐ MANDATORY FIELDS (Required)</text>

  <!-- Field 1: name -->
  <rect x="50" y="305" width="430" height="85" rx="8" fill="white" stroke="#0066CC" stroke-width="2"/>
  <text x="65" y="328" class="field-name">name:</text>
  <text x="65" y="348" class="field-desc">Concise identifier for your skill</text>
  <text x="65" y="365" class="example-text">Examples: "code-review", "image-gen"</text>
  <text x="65" y="380" class="example-text">"api-debugger", "data-analyzer"</text>

  <!-- Field 2: description -->
  <rect x="520" y="305" width="430" height="85" rx="8" fill="white" stroke="#0066CC" stroke-width="2"/>
  <text x="535" y="328" class="field-name">description:</text>
  <text x="535" y="348" class="field-desc">What the skill does (expertise)</text>
  <text x="535" y="365" class="example-text">Example: "Analyzes code for bugs,</text>
  <text x="535" y="380" class="example-text">performance, and best practices"</text>

  <!-- OPTIONAL FIELDS Section -->
  <rect x="30" y="500" width="940" height="230" rx="10" fill="#f9f9f9" stroke="#9933FF" stroke-width="2"/>
  <rect x="30" y="500" width="940" height="35" rx="10 10 0 0" fill="#9933FF"/>
  <text x="50" y="522" class="section-title">💡 OPTIONAL FIELDS (Customize)</text>

  <!-- Field 3: allowed-tools -->
  <rect x="50" y="555" width="430" height="85" rx="8" fill="white" stroke="#9933FF" stroke-width="2"/>
  <text x="65" y="578" class="field-name">allowed-tools:</text>
  <text x="65" y="598" class="field-desc">Tools your skill can access</text>
  <text x="65" y="615" class="example-text">Example: ["bash", "read",</text>
  <text x="65" y="630" class="example-text">"grep", "github"]</text>

  <!-- Field 4: model -->
  <rect x="520" y="555" width="430" height="85" rx="8" fill="white" stroke="#9933FF" stroke-width="2"/>
  <text x="535" y="578" class="field-name">model:</text>
  <text x="535" y="598" class="field-desc">Claude model for this skill</text>
  <text x="535" y="615" class="example-text">Example: "claude-opus-4-7"</text>
  <text x="535" y="630" class="example-text">"claude-sonnet-4-6"</text>

  <!-- DIRECTORY STRUCTURE Section -->
  <rect x="30" y="750" width="940" height="220" rx="10" fill="#f0f0f0" stroke="#00AA00" stroke-width="2"/>
  <rect x="30" y="750" width="940" height="35" rx="10 10 0 0" fill="#00AA00"/>
  <text x="50" y="772" class="section-title">📁 DIRECTORY STRUCTURE</text>

  <!-- Directory tree -->
  <text x="70" y="815" style="font-size: 13px; font-weight: bold; fill: #333333; font-family: 'Courier New', monospace;">my-skill/</text>
  <line x1="75" y1="820" x2="75" y2="885" stroke="#CCCCCC" stroke-width="2"/>

  <text x="90" y="835" style="font-size: 12px; fill: #333333; font-family: 'Courier New', monospace;">├── skill.md</text>
  <text x="90" y="855" style="font-size: 12px; fill: #333333; font-family: 'Courier New', monospace;">├── scripts/</text>
  <text x="110" y="870" style="font-size: 11px; fill: #666666; font-family: 'Courier New', monospace;">(main.py, helper.py, utils.py)</text>
  <text x="90" y="890" style="font-size: 12px; fill: #333333; font-family: 'Courier New', monospace;">├── references/</text>
  <text x="110" y="905" style="font-size: 11px; fill: #666666; font-family: 'Courier New', monospace;">(docs, examples, guides)</text>
  <text x="90" y="925" style="font-size: 12px; fill: #333333; font-family: 'Courier New', monospace;">└── assets/</text>
  <text x="110" y="940" style="font-size: 11px; fill: #666666; font-family: 'Courier New', monospace;">(icons, templates, data)</text>

  <!-- Colored boxes for directory purposes -->
  <rect x="450" y="810" width="120" height="50" rx="5" fill="#0066CC" stroke="#003D99" stroke-width="2"/>
  <text x="510" y="828" style="font-size: 11px; font-weight: bold; fill: white; font-family: Arial, sans-serif; text-anchor: middle;">Skill</text>
  <text x="510" y="843" style="font-size: 10px; fill: white; font-family: Arial, sans-serif; text-anchor: middle;">Definition</text>

  <rect x="590" y="810" width="120" height="50" rx="5" fill="#FF6600" stroke="#CC4400" stroke-width="2"/>
  <text x="650" y="828" style="font-size: 11px; font-weight: bold; fill: white; font-family: Arial, sans-serif; text-anchor: middle;">Code &</text>
  <text x="650" y="843" style="font-size: 10px; fill: white; font-family: Arial, sans-serif; text-anchor: middle;">Logic</text>

  <rect x="730" y="810" width="120" height="50" rx="5" fill="#9933FF" stroke="#6600CC" stroke-width="2"/>
  <text x="790" y="828" style="font-size: 11px; font-weight: bold; fill: white; font-family: Arial, sans-serif; text-anchor: middle;">Docs &</text>
  <text x="790" y="843" style="font-size: 10px; fill: white; font-family: Arial, sans-serif; text-anchor: middle;">Guides</text>

  <rect x="870" y="810" width="80" height="50" rx="5" fill="#00CCCC" stroke="#0099CC" stroke-width="2"/>
  <text x="910" y="828" style="font-size: 11px; font-weight: bold; fill: white; font-family: Arial, sans-serif; text-anchor: middle;">Files</text>
  <text x="910" y="843" style="font-size: 10px; fill: white; font-family: Arial, sans-serif; text-anchor: middle;">&amp; Data</text>

  <!-- BEST PRACTICES Section -->
  <rect x="30" y="990" width="940" height="230" rx="10" fill="#f9f9f9" stroke="#00AA00" stroke-width="2"/>
  <rect x="30" y="990" width="940" height="35" rx="10 10 0 0" fill="#00AA00"/>
  <text x="50" y="1012" class="section-title">✅ BEST PRACTICES</text>

  <!-- Best practices grid (2 columns) -->
  <g id="practices">
    <!-- Row 1 -->
    <text x="65" y="1055" class="checkbox">✓</text>
    <text x="85" y="1053" style="font-size: 13px; fill: #333333; font-family: Arial, sans-serif;">Focus on ONE primary task</text>

    <text x="535" y="1055" class="checkbox">✓</text>
    <text x="555" y="1053" style="font-size: 13px; fill: #333333; font-family: Arial, sans-serif;">Clear, descriptive names</text>

    <!-- Row 2 -->
    <text x="65" y="1085" class="checkbox">✓</text>
    <text x="85" y="1083" style="font-size: 13px; fill: #333333; font-family: Arial, sans-serif;">Only specify tools if needed</text>

    <text x="535" y="1085" class="checkbox">✓</text>
    <text x="555" y="1083" style="font-size: 13px; fill: #333333; font-family: Arial, sans-serif;">Organize code logically</text>

    <!-- Row 3 -->
    <text x="65" y="1115" class="checkbox">✓</text>
    <text x="85" y="1113" style="font-size: 13px; fill: #333333; font-family: Arial, sans-serif;">Document with examples</text>

    <text x="535" y="1115" class="checkbox">✓</text>
    <text x="555" y="1113" style="font-size: 13px; fill: #333333; font-family: Arial, sans-serif;">Stay under 500 lines</text>

    <!-- Row 4 -->
    <text x="65" y="1145" class="checkbox">✓</text>
    <text x="85" y="1143" style="font-size: 13px; fill: #333333; font-family: Arial, sans-serif;">Make reusable &amp; composable</text>
  </g>

  <!-- SKILL DEFINITION EXAMPLE Section -->
  <rect x="30" y="1240" width="940" height="130" rx="10" fill="#f0f8ff" stroke="#3399FF" stroke-width="2"/>
  <rect x="30" y="1240" width="940" height="35" rx="10 10 0 0" fill="#3399FF"/>
  <text x="50" y="1262" class="section-title">📋 EXAMPLE: Code Review Skill</text>

  <!-- Code example -->
  <text x="65" y="1295" style="font-size: 11px; fill: #0066CC; font-weight: bold; font-family: 'Courier New', monospace;">name:</text>
  <text x="150" y="1295" style="font-size: 11px; fill: #333333; font-family: 'Courier New', monospace;">code-review</text>

  <text x="65" y="1315" style="font-size: 11px; fill: #0066CC; font-weight: bold; font-family: 'Courier New', monospace;">description:</text>
  <text x="190" y="1315" style="font-size: 11px; fill: #333333; font-family: 'Courier New', monospace;">Analyzes code for bugs, performance issues...</text>

  <text x="65" y="1335" style="font-size: 11px; fill: #0066CC; font-weight: bold; font-family: 'Courier New', monospace;">allowed-tools:</text>
  <text x="200" y="1335" style="font-size: 11px; fill: #333333; font-family: 'Courier New', monospace;">["bash", "read", "grep"]</text>

  <text x="65" y="1355" style="font-size: 11px; fill: #0066CC; font-weight: bold; font-family: 'Courier New', monospace;">model:</text>
  <text x="150" y="1355" style="font-size: 11px; fill: #333333; font-family: 'Courier New', monospace;">claude-opus-4-7</text>

  <!-- Footer -->
  <line x1="50" y1="1390" x2="950" y2="1390" stroke="#CCCCCC" stroke-width="1"/>
</svg>